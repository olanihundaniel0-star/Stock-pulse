
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPulse | Inventory Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
          darkMode: 'selector',
          theme: {
            extend: {
              fontFamily: {
                sans: ['Inter', 'sans-serif'],
                mono: ['Roboto Mono', 'monospace'],
              },
            },
          },
        }

        // Initialize theme before rendering to avoid flash
        if (localStorage.getItem('stockpulse_theme') === 'dark' || (!('stockpulse_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        } else {
          document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'Roboto Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        .dark ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
        
        /* ========================================
           GLOBAL DARK MODE OVERRIDES
           ======================================== */
        
        /* Input fields */
        .dark input,
        .dark select,
        .dark textarea {
          background-color: rgb(30 41 59) !important; /* slate-800 */
          color: rgb(248 250 252) !important; /* slate-50 */
          border-color: rgb(51 65 85) !important; /* slate-700 */
        }
        .dark input::placeholder,
        .dark textarea::placeholder {
          color: rgb(148 163 184) !important; /* slate-400 */
        }
        .dark input:focus,
        .dark select:focus,
        .dark textarea:focus {
          border-color: rgb(59 130 246) !important; /* blue-500 */
        }
        
        /* Labels - form field labels, small caps labels */
        .dark label {
          color: rgb(203 213 225) !important; /* slate-300 */
        }
        
        /* Primary headings (text-slate-800, text-slate-900) */
        .dark .text-slate-800,
        .dark .text-slate-900 {
          color: rgb(248 250 252) !important; /* slate-50 */
        }
        
        /* Secondary text (text-slate-600, text-slate-700) */
        .dark .text-slate-600,
        .dark .text-slate-700 {
          color: rgb(203 213 225) !important; /* slate-300 */
        }
        
        /* Muted/description text (text-slate-400, text-slate-500) */
        .dark .text-slate-400 {
          color: rgb(148 163 184) !important; /* slate-400 - keep as is, already visible */
        }
        .dark .text-slate-500 {
          color: rgb(148 163 184) !important; /* slate-400 */
        }
        
        /* Table headers and rows */
        .dark thead {
          background-color: rgb(30 41 59) !important; /* slate-800 */
        }
        .dark th {
          color: rgb(148 163 184) !important; /* slate-400 */
        }
        .dark td {
          color: rgb(226 232 240) !important; /* slate-200 */
        }
        .dark tbody tr:hover {
          background-color: rgb(30 41 59) !important; /* slate-800 */
        }
        
        /* Card backgrounds */
        .dark .bg-slate-50 {
          background-color: rgb(30 41 59) !important; /* slate-800 */
        }
        .dark .bg-slate-100 {
          background-color: rgb(51 65 85) !important; /* slate-700 */
        }
        .dark .bg-white {
          background-color: rgb(15 23 42) !important; /* slate-900 */
        }
        
        /* Borders */
        .dark .border-slate-100,
        .dark .border-slate-200 {
          border-color: rgb(51 65 85) !important; /* slate-700 */
        }
        
        /* Icons in inputs and muted icons */
        .dark svg.text-slate-400,
        .dark svg.text-slate-500,
        .dark .text-slate-400 svg,
        .dark .text-slate-500 svg {
          color: rgb(148 163 184) !important; /* slate-400 */
        }
        
        /* Sidebar text */
        .dark nav span,
        .dark nav p {
          color: rgb(203 213 225); /* slate-300 */
        }
        
        /* Stat card numbers */
        .dark h4 {
          color: rgb(248 250 252) !important; /* slate-50 */
        }
        
        /* Button cancel/secondary states */
        .dark .bg-slate-100.text-slate-600 {
          background-color: rgb(51 65 85) !important; /* slate-700 */
          color: rgb(203 213 225) !important; /* slate-300 */
        }
        
        /* Blue accent colors for admin badges etc */
        .dark .text-blue-900 {
          color: rgb(96 165 250) !important; /* blue-400 */
        }
        .dark .bg-blue-100 {
          background-color: rgb(30 58 138) !important; /* blue-900 */
        }
        
        /* Dividers */
        .dark .divide-slate-100 > :not([hidden]) ~ :not([hidden]),
        .dark .divide-slate-200 > :not([hidden]) ~ :not([hidden]) {
          border-color: rgb(51 65 85) !important; /* slate-700 */
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen transition-colors duration-300">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
